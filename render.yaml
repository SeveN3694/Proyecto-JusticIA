services:
  - type: web
    name: justicia-backend
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.11
      - key: NEON_DATABASE_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
